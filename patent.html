<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>소방박람회 특허 대시보드 — 한국조달컨설팅</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;
  --border:#2a2f45;--border2:#363c58;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#475569;
  --blue:#3b82f6;--blue-bg:rgba(59,130,246,.12);--blue-border:rgba(59,130,246,.3);
  --green:#10b981;--green-bg:rgba(16,185,129,.12);--green-border:rgba(16,185,129,.3);
  --amber:#f59e0b;--amber-bg:rgba(245,158,11,.12);--amber-border:rgba(245,158,11,.3);
  --red:#ef4444;--red-bg:rgba(239,68,68,.12);--red-border:rgba(239,68,68,.3);
  --gray-bg:rgba(148,163,184,.08);
  --font:'Noto Sans KR',system-ui,sans-serif;
  --mono:'JetBrains Mono','Fira Code',monospace;
  --radius:10px;--radius-sm:6px;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;min-height:100vh}
a{color:var(--blue);text-decoration:none}

/* 헤더 */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.logo{width:36px;height:36px;background:linear-gradient(135deg,var(--blue),#06b6d4);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.header-title{font-size:15px;font-weight:700}
.header-sub{font-size:11px;color:var(--text2);margin-top:1px}
.header-right{margin-left:auto;font-size:11px;color:var(--text3)}

/* 통계 카드 */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:20px 24px 0}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.stat-n{font-size:28px;font-weight:700;font-family:var(--mono);line-height:1}
.stat-l{font-size:11px;color:var(--text2);margin-top:5px}
.n-green{color:var(--green)}.n-blue{color:var(--blue)}.n-amber{color:var(--amber)}.n-gray{color:var(--text2)}

/* 메인 레이아웃 */
.main{display:grid;grid-template-columns:300px 1fr;gap:12px;padding:16px 24px;min-height:calc(100vh - 160px)}

/* 왼쪽 목록 */
.list-panel{display:flex;flex-direction:column;gap:8px}
.filter-bar{display:flex;gap:6px;flex-direction:column}
.search-wrap{position:relative}
.search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:8px 10px 8px 32px;font-size:12px;font-family:var(--font);outline:none;transition:border .2s}
.search-wrap input:focus{border-color:var(--blue)}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px}
.filter-row{display:flex;gap:6px}
.filter-row select{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:7px 8px;font-size:11px;font-family:var(--font);outline:none;cursor:pointer}
.co-list{overflow-y:auto;max-height:calc(100vh - 280px);display:flex;flex-direction:column;gap:5px;padding-right:2px}
.co-list::-webkit-scrollbar{width:3px}
.co-list::-webkit-scrollbar-track{background:transparent}
.co-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

/* 업체 카드 */
.co-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;cursor:pointer;transition:all .15s}
.co-item:hover{border-color:var(--border2)}
.co-item.active{border-color:var(--blue);background:var(--blue-bg)}
.co-item-top{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.co-name{font-size:12px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.co-dots{display:flex;gap:6px;align-items:center}
.stat-dot{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--text2)}
.dot{width:6px;height:6px;border-radius:50%}
.d-green{background:var(--green)}.d-blue{background:var(--blue)}.d-gray{background:var(--text3)}.d-amber{background:var(--amber)}

/* 배지 */
.badge{display:inline-flex;align-items:center;font-size:10px;padding:2px 7px;border-radius:99px;font-weight:600;flex-shrink:0}
.b-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.b-amber{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.b-blue{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.b-gray{background:var(--gray-bg);color:var(--text2);border:1px solid var(--border)}
.b-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.b-pri-aaa{background:rgba(239,68,68,.12);color:#fca5a5;border:1px solid rgba(239,68,68,.25)}
.b-pri-aa{background:rgba(245,158,11,.12);color:#fcd34d;border:1px solid rgba(245,158,11,.25)}

/* 오른쪽 상세 패널 */
.detail-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;overflow-y:auto;max-height:calc(100vh - 200px)}
.detail-panel::-webkit-scrollbar{width:3px}
.detail-panel::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:12px;color:var(--text3)}
.empty-icon{font-size:48px;opacity:.3}

/* 상세 헤더 */
.detail-hdr{margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.detail-name{font-size:18px;font-weight:700;margin-bottom:6px}
.detail-badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px}
.detail-memo{font-size:12px;color:var(--text2);font-style:italic}

/* 요약 그리드 */
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.sum-item{background:var(--surface2);border-radius:var(--radius-sm);padding:10px;text-align:center}
.sum-n{font-size:20px;font-weight:700;font-family:var(--mono)}
.sum-l{font-size:10px;color:var(--text2);margin-top:3px}

/* 섹션 */
.section-title{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;margin:14px 0 8px;display:flex;align-items:center;gap:6px}
.section-dot{width:7px;height:7px;border-radius:50%}

/* 특허 카드 */
.patent-card{border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:7px;border:1px solid}
.pc-usable{background:var(--green-bg);border-color:var(--green-border)}
.pc-app{background:var(--amber-bg);border-color:var(--amber-border)}
.pc-old{background:var(--gray-bg);border-color:var(--border);opacity:.75}
.pc-exp{background:var(--red-bg);border-color:var(--red-border);opacity:.6}
.patent-title{font-size:13px;font-weight:600;margin-bottom:7px;line-height:1.4;color:var(--text)}
.patent-meta{display:flex;gap:12px;flex-wrap:wrap;font-family:var(--mono);font-size:11px;color:var(--text2);margin-bottom:6px}
.meta-item{display:flex;align-items:center;gap:4px}
.meta-label{color:var(--text3)}
.patent-abstract{font-size:11px;color:var(--text2);line-height:1.6;padding-top:7px;border-top:1px solid rgba(255,255,255,.06)}

/* 버튼 */
.btn-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:16px}
.btn{padding:7px 14px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;font-family:var(--font);border:1px solid}
.btn-primary{background:var(--blue);border-color:var(--blue);color:#fff}
.btn-primary:hover{opacity:.88}
.btn-secondary{background:transparent;border-color:var(--border2);color:var(--text2)}
.btn-secondary:hover{border-color:var(--blue);color:var(--blue)}
.btn-green{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}
.btn-green:hover{opacity:.8}

/* 반응형 */
@media(max-width:768px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .main{grid-template-columns:1fr}
  .co-list{max-height:280px}
  .detail-panel{max-height:none}
}

/* 스크롤 위치 표시줄 */
.count-label{font-size:11px;color:var(--text3);text-align:right;padding:2px 0}
</style>
</head>

  <div class="logo">📋</div>
  <div>
    <div class="header-title">소방박람회 특허 대시보드</div>
    <div class="header-sub">2026 국제소방안전박람회 참가업체 41개사 · KIPRIS 특허 현황</div>

let selectedName = null;

function calcProcurement(p){
  if(p.status==='등록' && p.new7) return 'usable';
  if(p.status==='출원') return 'app';
  if(['소멸/만료','포기','거절'].includes(p.status)) return 'exp';
  return 'old';
}

function renderStats(){
  const usable = RAW.filter(d=>d.yr7>0).length;
  const total7  = RAW.reduce((s,d)=>s+d.yr7,0);
  const appOnly = RAW.filter(d=>d.app>0 && d.yr7===0).length;
  const none    = RAW.filter(d=>d.total===0).length;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-n n-green">${usable}</div><div class="stat-l">즉시 제안서 가능 업체</div></div>
    <div class="stat"><div class="stat-n n-blue">${total7}</div><div class="stat-l">7년미만 유력 특허 합계</div></div>
    <div class="stat"><div class="stat-n n-amber">${appOnly}</div><div class="stat-l">출원중 모니터링</div></div>
    <div class="stat"><div class="stat-n n-gray">${none}</div><div class="stat-l">특허없음 (컨설팅 필요)</div></div>
  `;
}

function getFiltered(){
  const q  = document.getElementById('search').value.toLowerCase();
  const fs = document.getElementById('filter-status').value;
  const fp = document.getElementById('filter-pri').value;
  return RAW.filter(d=>{
    if(q && !d.name.toLowerCase().includes(q)) return false;
    if(fp && d.pri!==fp) return false;
    if(fs==='usable' && d.yr7===0) return false;
    if(fs==='app' && d.app===0) return false;
    if(fs==='none' && d.total>0) return false;
    return true;
  });
}

    else if(d.total>0) statusBadge=`<span class="badge b-blue">${d.total}건</span>`;
    else statusBadge=`<span class="badge b-gray">특허없음</span>`;
    return `<div class="co-item${active?' active':''}" onclick="selectCo('${d.name.replace(/'/g,"\'")}')">
      <div class="co-item-top">
        <span class="co-name">${d.name}</span>
        <span class="badge ${d.pri==='★★★'?'b-pri-aaa':'b-pri-aa'}">${d.pri}</span>
      </div>
      <div class="co-dots">
        ${statusBadge}
        ${d.reg>0?`<span class="stat-dot"><span class="dot d-green"></span>${d.reg}등록</span>`:''}
        ${d.app>0?`<span class="stat-dot"><span class="dot d-amber"></span>${d.app}출원</span>`:''}
      </div>
    </div>`;
  }).join('')||'<div style="text-align:center;color:var(--text3);padding:2rem;font-size:12px">검색 결과 없음</div>';
}

function selectCo(name){
  selectedName=name;
  renderList();
  const d=RAW.find(x=>x.name===name);
  if(!d) return;
  const el=document.getElementById('detail-panel');

  if(d.total===0){
    el.innerHTML=`
      <div class="detail-hdr">
        <div class="detail-name">${d.name}</div>
        <div class="detail-badges">
          <span class="badge ${d.pri==='★★★'?'b-pri-aaa':'b-pri-aa'}">${d.pri}</span>
          ${d.cert.map(c=>`<span class="badge b-blue">${c}</span>`).join('')}
        </div>
        <div class="detail-memo">${d.memo||''}</div>
      </div>
      <div style="text-align:center;padding:3rem 0;color:var(--text3)">
        <div style="font-size:36px;margin-bottom:12px;opacity:.3">📭</div>
        <div style="font-size:13px;margin-bottom:4px">등록·출원 특허가 확인되지 않았습니다</div>
        <div style="font-size:11px">KIPRIS 검색 결과 없음 — 특허 출원 컨설팅 또는 다른 명칭 확인 필요</div>
      </div>
      <div class="btn-row">
        <a href="https://www.kipris.or.kr/khome/main.jsp" target="_blank" class="btn btn-secondary">KIPRIS 직접 확인 →</a>
      </div>`;
    return;
  }

  const usable = d.patents.filter(p=>p.status==='등록'&&p.new7);
  const appPs  = d.patents.filter(p=>p.status==='출원');
  const oldPs  = d.patents.filter(p=>p.status==='등록'&&!p.new7);
  const expPs  = d.patents.filter(p=>['소멸/만료','포기','거절'].includes(p.status));

  function patCard(p){
    const t = calcProcurement(p);
    const cls = t==='usable'?'pc-usable':t==='app'?'pc-app':t==='exp'?'pc-exp':'pc-old';
    const no = p.reg_no||p.app_no||'-';
    const dt = p.reg_date||p.app_date||'-';
    const kiprisUrl = p.app_no ?
      `https://www.kipris.or.kr/khome/main.jsp` : '#';
    return `<div class="patent-card ${cls}">
      <div style="display:flex;align-items:flex-start;gap:6px;margin-bottom:6px">
        ${t==='usable'?'<span class="badge b-green">✓ 7년미만</span>':''}
        ${t==='app'?'<span class="badge b-amber">출원중</span>':''}
        ${t==='old'?'<span class="badge b-gray">7년초과</span>':''}
        ${t==='exp'?'<span class="badge b-red">${p.status}</span>':''}
      </div>
      <div class="patent-title">${p.title}</div>
      <div class="patent-meta">
        <span class="meta-item"><span class="meta-label">번호</span>${no}</span>
        ${p.reg_date?`<span class="meta-item"><span class="meta-label">등록</span>${p.reg_date}</span>`:''}
        ${p.app_date?`<span class="meta-item"><span class="meta-label">출원</span>${p.app_date}</span>`:''}
        ${p.expire_date&&p.expire_date!=='-'?`<span class="meta-item"><span class="meta-label">만료</span>${p.expire_date}</span>`:''}
        ${p.years_passed!=null?`<span class="meta-item"><span class="meta-label">경과</span>${p.years_passed}년</span>`:''}
        ${p.inventor?`<span class="meta-item"><span class="meta-label">발명자</span>${p.inventor}</span>`:''}
      </div>
      ${p.abstract?`<div class="patent-abstract">${p.abstract.slice(0,200)}${p.abstract.length>200?'...':''}</div>`:''}
    </div>`;
  }

  el.innerHTML=`
    <div class="detail-hdr">
      <div class="detail-name">${d.name}</div>
      <div class="detail-badges">
        <span class="badge ${d.pri==='★★★'?'b-pri-aaa':'b-pri-aa'}">${d.pri}</span>
        ${d.cert.map(c=>`<span class="badge b-blue">${c}</span>`).join('')}
      </div>
      <div class="detail-memo">${d.memo||''}</div>
    </div>

    <div class="summary-grid">
      <div class="sum-item"><div class="sum-n n-green">${d.yr7}</div><div class="sum-l">7년미만</div></div>
      <div class="sum-item"><div class="sum-n n-blue">${d.reg}</div><div class="sum-l">등록</div></div>
      <div class="sum-item"><div class="sum-n n-amber">${d.app}</div><div class="sum-l">출원중</div></div>
      <div class="sum-item"><div class="sum-n" style="color:var(--text2)">${d.total}</div><div class="sum-l">전체</div></div>
    </div>

    ${usable.length?`
      <div class="section-title">
        <span class="section-dot" style="background:var(--green)"></span>
        7년미만 조달유력 특허 (${usable.length}건)
      </div>
      ${usable.map(patCard).join('')}`:''}

    ${appPs.length?`
      <div class="section-title">
        <span class="section-dot" style="background:var(--amber)"></span>
        출원중 (${appPs.length}건) — 등록 후 조달 활용 가능
      </div>
      ${appPs.map(patCard).join('')}`:''}

    ${oldPs.length?`
      <div class="section-title">
        <span class="section-dot" style="background:var(--text3)"></span>
        7년 초과 등록 (${oldPs.length}건)
      </div>
      ${oldPs.map(patCard).join('')}`:''}

    ${expPs.length?`
      <div class="section-title">
        <span class="section-dot" style="background:var(--red)"></span>
        소멸/만료/포기 (${expPs.length}건)
      </div>
      ${expPs.map(patCard).join('')}`:''}

    <div class="btn-row">
      ${d.yr7>0?`<button class="btn btn-green" onclick="alert('제안서 생성 기능은 Claude에서 patent_results.json을 업로드하여 사용하세요.')">제안서 작성</button>`:''}
      <a href="https://www.kipris.or.kr/khome/main.jsp" target="_blank" class="btn btn-secondary">KIPRIS 확인 →</a>
    </div>
  `;
}

document.getElementById('search').addEventListener('input',renderList);
document.getElementById('filter-status').addEventListener('change',renderList);
document.getElementById('filter-pri').addEventListener('change',renderList);

renderStats();
renderList();
</script>
</body>
</html>
