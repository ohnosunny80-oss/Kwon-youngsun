<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="light only">
<title>AI안전보건박람회 상담앱</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{background:#12203a}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#12203a;height:100vh;overflow:hidden;color:#111}
#top{position:fixed;top:0;left:0;right:0;min-height:50px;background:#0d47a1;display:flex;align-items:center;gap:8px;padding:6px 12px;z-index:999;flex-wrap:wrap}
#top h1{font-size:14px;font-weight:800;color:#fff;white-space:nowrap}
#me{font-size:12px;font-weight:700;color:#fff;background:rgba(255,255,255,.16);padding:3px 9px;border-radius:6px}
#srch{padding:5px 10px;border-radius:6px;border:none;font-size:13px;width:150px;outline:none;background:rgba(255,255,255,.16);color:#fff;font-family:inherit}
#srch::placeholder{color:rgba(255,255,255,.55)}
.fbar{display:flex;gap:4px;flex-wrap:wrap}
.fb{font-size:11px;padding:3px 9px;border-radius:99px;border:1.5px solid rgba(255,255,255,.35);background:transparent;color:#fff;cursor:pointer;white-space:nowrap;font-family:inherit}
.fb.on{background:#fff;color:#0d47a1;font-weight:700;border-color:#fff}
.tabs{margin-left:auto;display:flex;gap:3px}
.tab{font-size:12px;padding:5px 12px;border-radius:6px;border:1.5px solid rgba(255,255,255,.35);background:transparent;color:#fff;cursor:pointer;font-family:inherit}
.tab.on{background:#fff;color:#0d47a1;font-weight:700}
#sync{font-size:10px;color:rgba(255,255,255,.7);white-space:nowrap;cursor:pointer}
#wrap{display:flex;width:100%;height:calc(100vh - 56px);margin-top:56px}
.view{display:none;width:100%;height:100%}
.view.on{display:flex;flex-direction:row;width:100%;height:100%}
#statsView.on{display:flex;flex-direction:column;overflow-y:auto;background:#f4f4f6;padding:16px;width:100%;height:100%}
#mapPanel{flex:1;min-width:0;overflow:hidden;padding:12px;background:#12203a;display:flex;flex-direction:column}
#mapViewport{position:relative;flex:1;min-height:0;overflow:hidden;touch-action:none;background:#0e1a30;border-radius:8px;cursor:grab}
#mapViewport:active{cursor:grabbing}
#mapStage{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform;padding:6px 8px}
#det{width:380px;flex-shrink:0;background:#fff;color:#111;overflow-y:auto;border-left:1px solid #e8e8e8;display:flex;flex-direction:column}
@media(max-width:768px){
 #top h1{font-size:12px}
 .view.on{flex-direction:column}
 #mapPanel{flex:none;height:46vh;width:100%}
 #det{width:100%;height:54vh;flex:none;border-left:none;border-top:2px solid #e8e8e8}
 #wrap{height:calc(100vh - 84px);margin-top:84px}
 #statsView.on{height:calc(100vh - 84px)}
}
.leg{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:4px;font-size:10px;color:#9fb0d0}
.lb{width:12px;height:12px;border-radius:3px}
.wing-hd{color:#9fb0d0;font-size:13px;font-weight:700;margin:6px 0 8px;display:flex;align-items:center;gap:6px}
.wing-hd em{background:#0d47a1;color:#fff;font-style:normal;font-size:10px;padding:1px 8px;border-radius:99px}
.det-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#ccc;gap:10px;text-align:center;padding:24px}
.dh{padding:13px 15px;border-bottom:1px solid #f0f0f0;background:#fff;position:sticky;top:0;z-index:10}
.dh-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.bno{font-size:24px;font-weight:900;color:#0d47a1;line-height:1}
.cnm{font-size:15px;font-weight:700;color:#111;margin-top:3px;line-height:1.3}
.cen{font-size:11px;color:#999}
.badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.bg{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;color:#fff}
.bg.dm{background:#0d47a1}
.co-info{font-size:11px;color:#777;display:flex;flex-direction:column;gap:2px;margin-top:6px;line-height:1.6}
.co-info a{color:#0d47a1;text-decoration:none}
.btn-row{display:flex;gap:6px;margin-top:10px}
.vbtn{flex:1;padding:9px;border:1.5px solid #ddd;border-radius:8px;cursor:pointer;font-size:12px;background:#fff;color:#555;font-family:inherit;font-weight:700}
.vbtn.done{background:#e8f5e9;color:#2e7d32;border-color:#2e7d32}
.cbtn.done{background:#fff8e1;color:#e65100;border-color:#e65100}
.sec{padding:11px 15px;border-bottom:1px solid #f2f2f2}
.sec:last-child{border-bottom:none}
.sh{font-size:10px;font-weight:700;color:#aaa;letter-spacing:.6px;margin-bottom:8px}
.msgbox{background:#e3f2fd;border:1px solid #90caf9;border-radius:8px;padding:10px 12px;font-size:12px;color:#0d47a1;line-height:1.6}
.pc{border:1px solid #eee;border-radius:8px;padding:10px 12px;border-left:4px solid #6a1b9a}
.pname{font-size:13px;font-weight:700;color:#111;margin:2px 0 4px;line-height:1.4}
.pmeta{font-size:10px;color:#999;line-height:1.7;font-family:monospace}
.pcl{font-size:11px;color:#555;line-height:1.6;margin-top:5px;background:#faf5ff;padding:6px 8px;border-radius:6px}
.cnt{display:inline-block;font-size:10px;background:#ede7f6;color:#4527a0;padding:1px 7px;border-radius:99px;font-weight:700;margin-right:4px}
.chip{display:inline-block;font-size:10px;background:#e8f5e9;color:#2e7d32;padding:2px 8px;border-radius:99px;margin:2px 3px 0 0;font-weight:600}
.tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:99px;margin-right:4px;font-weight:700}
.ai-box{margin-top:8px;background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:8px 10px}
.ai-lbl{font-size:9px;font-weight:700;color:#15803d;margin-bottom:4px}
.ai-txt{font-size:11px;color:#14532d;line-height:1.65}
.note-ta{width:100%;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;padding:10px 12px;resize:vertical;min-height:90px;line-height:1.7;font-family:inherit;outline:none;color:#111}
.note-ta:focus{border-color:#0d47a1}
.nodata{font-size:11px;color:#bbb;font-style:italic}
.warn{background:#fff3e0;border:1px solid #ffb74d;border-radius:8px;padding:8px 10px;font-size:11px;color:#e65100;line-height:1.5}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px}
.sc{background:#fff;border-radius:10px;padding:14px;border:.5px solid #eee}
.sv{font-size:26px;font-weight:800;color:#0d47a1}.sl{font-size:11px;color:#999;margin-top:3px}
.shd{font-size:14px;font-weight:700;color:#222;margin:4px 0 10px}
.vl{background:#fff;border-radius:10px;border:.5px solid #eee;overflow:hidden;margin-bottom:16px}
.vr{display:flex;flex-direction:column;padding:11px 14px;border-bottom:.5px solid #f2f2f2;font-size:12px;gap:4px}
.vr:last-child{border-bottom:none}
#statsInner{max-width:880px;margin:0 auto;width:100%;padding-bottom:40px}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:#ccc;border-radius:99px}
.growbtn{display:inline-block;font-size:11px;background:#0d47a1;color:#fff;padding:6px 12px;border-radius:8px;text-decoration:none;font-weight:700}
.procbox{background:#e3f2fd;border:1px solid #90caf9;border-radius:8px;padding:10px 12px}
.qrow{display:flex;flex-wrap:wrap;gap:5px}
.qbtn{font-size:11px;padding:6px 10px;border:1.5px solid #0d47a1;background:#fff;color:#0d47a1;border-radius:99px;cursor:pointer;font-family:inherit;font-weight:600}
.qbtn:active{background:#0d47a1;color:#fff}
.aiin{flex:1;min-width:0;border:1px solid #ddd;border-radius:8px;padding:8px 10px;font-size:12px;font-family:inherit;outline:none}
.aiq{margin-top:8px;background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:10px}
.savebtn{margin-top:7px;font-size:11px;padding:5px 12px;background:#15803d;color:#fff;border:none;border-radius:6px;cursor:pointer;font-family:inherit}
.rankpill{display:inline-block;font-size:10px;background:#0d47a1;color:#fff;padding:1px 8px;border-radius:99px;font-weight:700}
.certchip{display:inline-block;font-size:10px;padding:2px 8px;border-radius:99px;margin:2px 3px 0 0;font-weight:600}
.certchip.ok{background:#e8f5e9;color:#2e7d32}
.certchip.chk{background:#fff3e0;color:#e65100}
.certline{font-size:11px;padding:5px 9px;border-radius:6px;margin-bottom:4px;line-height:1.45;display:flex;justify-content:space-between;gap:8px;align-items:center}
.certline.ok{background:#e8f5e9;color:#2e7d32}
.certline.exp{background:#fbe9e7;color:#c62828}
.certline.chk{background:#fff3e0;color:#e65100}
.certline .cd{font-size:10px;opacity:.85;white-space:nowrap;font-family:monospace}
.priceline{display:flex;justify-content:space-between;gap:10px;font-size:12px;padding:6px 0;border-bottom:1px dashed #eee;color:#333}
.priceline:last-child{border-bottom:none}
.priceline b{color:#0d47a1;white-space:nowrap}
.zoombar{display:flex;gap:6px;align-items:center;margin-bottom:10px;position:sticky;top:0;z-index:5}
.zoombar button{min-width:36px;height:32px;border:1px solid rgba(255,255,255,.45);background:rgba(255,255,255,.14);color:#fff;border-radius:7px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit}
.zoombar button:active{background:#fff;color:#0d47a1}
.zoombar #zoomhint{font-size:10px;color:#9fb0d0;margin-left:2px}
#listView.on{display:flex;flex-direction:column;overflow-y:auto;background:#f4f4f6;padding:12px;width:100%;height:100%}
#listInner{max-width:760px;margin:0 auto;width:100%;padding-bottom:40px}
.lsec{font-size:13px;font-weight:800;color:#0d47a1;margin:14px 4px 8px}
.lsec span{font-size:11px;color:#999;font-weight:600}
.lrow{display:flex;align-items:center;gap:10px;background:#fff;border:.5px solid #eee;border-radius:10px;padding:10px 12px;margin-bottom:7px;cursor:pointer}
.lrow:active{background:#eef4ff}
.lrow.sel{border-color:#FFD600;box-shadow:0 0 0 2px #FFD600}
.lb2{font-size:13px;font-weight:800;color:#0d47a1;min-width:56px}
.ln{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.ln b{font-size:13px;color:#111;line-height:1.3}
.lsp{font-size:11px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lchips{display:flex;flex-wrap:wrap;gap:3px;justify-content:flex-end;max-width:120px}
.lc{font-size:9px;font-weight:700;padding:2px 6px;border-radius:99px;background:#eee;color:#666;white-space:nowrap}
.lc.v{background:#e8f5e9;color:#2e7d32}.lc.cd{background:#fff8e1;color:#e65100}.lc.dm{background:#e3f2fd;color:#0d47a1}.lc.ct{background:#f3e5f5;color:#6a1b9a}
#catbar{display:flex;gap:6px;overflow-x:auto;padding:2px 2px 10px;-webkit-overflow-scrolling:touch;position:sticky;top:0;background:#f4f4f6;z-index:5}
#catbar::-webkit-scrollbar{height:0}
.catchip{flex:none;font-size:12px;font-weight:600;padding:7px 13px;border-radius:99px;border:1.5px solid #ccd;background:#fff;color:#555;cursor:pointer;white-space:nowrap}
.catchip.on{background:#0d47a1;color:#fff;border-color:#0d47a1}
@media(max-width:768px){#listView.on{height:calc(100vh - 84px)} .zoombar #zoomhint{display:none}}
</style>
</head>

    <button class="tab on" onclick="showTab(this,'map')">🗺 지도</button>
    <button class="tab" onclick="showTab(this,'list')">📋 목록</button>
    <button class="tab" onclick="showTab(this,'stats')">📊 통계</button>
  </div>
</div>
<div id="wrap">
  <div id="mapView" class="view on">
    <div id="mapPanel">
      <div class="zoombar">
        <button onclick="zBtn(-1)">－</button>

        <button onclick="zBtn(1)">＋</button>
        <span id="zoomhint">✌️ 두 손가락으로 확대·축소 · 끌어서 이동</span>

        <div class="li"><div class="lb" style="background:#00897b"></div>B+</div>
        <div class="li"><div class="lb" style="background:#616161"></div>B</div>
        <div class="li"><div class="lb" style="background:#f9a825"></div>B21</div>
        <div class="li"><div class="lb" style="background:#78909c"></div>일반</div>
        <div class="li"><div class="lb" style="background:#2e7d32"></div>방문완료</div>
      </div>
      <div id="mapViewport"><div id="mapStage">
        <div class="wing-hd">7관 Hall 7 <em>A–M</em></div>
        <div id="h7"></div>
        <div class="wing-hd" style="margin-top:14px">8관 Hall 8 <em>A–L</em></div>
        <div id="h8"></div>
      </div></div>
    </div>
    <div id="det">
      <div class="det-empty">
        <div style="font-size:38px">🏢</div>
        <div style="font-size:13px;font-weight:700;color:#bbb">부스를 클릭하세요</div>
        <div style="font-size:12px;color:#ccc;line-height:1.8">특허 · 인증 · 상담 메시지<br><span style="color:#86efac">📮 DM 발송완료 83곳이 우선 공략 대상</span></div>
      </div>
    </div>
  </div>
  <div id="statsView" class="view"><div id="statsInner"></div></div>
  <div id="listView" class="view"><div id="catbar"></div><div id="listInner"></div></div>
</div>

  /* 경쟁 무대(세부품명) + 종합쇼핑몰 경쟁사 */

    h+='<div class="sec"><div class="sh">🎯 경쟁 무대 · 세부품명</div>'
      +'<div style="font-size:13px;font-weight:700;color:#111">'+esc(c.spmm)+(c.spno?' <span style="font-size:10px;color:#999;font-weight:400">('+c.spno+')</span>':'')+'</div>'
      +'<div style="font-size:11px;color:#666;margin-top:3px">'+(c.mfr?'🏭 제조업체':'유통·서비스')+'</div>';
    if(c.compn){
      h+='<div style="margin-top:8px;font-size:12px;color:#0d47a1"><b>종합쇼핑몰 등록 경쟁사 '+c.compn+'곳</b></div>';
      if(c.compnm&&c.compnm.length)h+='<div style="font-size:11px;color:#777;margin-top:3px;line-height:1.6">'+c.compnm.map(esc).join(' · ')+(c.compn>c.compnm.length?' 외':'')+'</div>';
      h+='<div style="margin-top:5px;font-size:10px;color:#aaa">※ 종합쇼핑몰(183R) 등록 기준. 190R 실적 순위·점유율은 별도.</div>';
    }
    h+='</div>';
  }
  /* 채널별 금액대 */
  var prc=function(a){return (a&&a[1])?(a[0]===a[1]?wonFmt(a[0])+'원':wonFmt(a[0])+'~'+wonFmt(a[1])+'원'):'';};
  var prows=[];
  if(prc(c.mp))prows.push(['종합쇼핑몰(MAS) 계약단가',prc(c.mp)]);
  if(prc(c.xp))prows.push(['우수 제3자단가',prc(c.xp)]);
  if(prc(c.vp))prows.push(['벤처나라 게시단가',prc(c.vp)]);
  if(prc(c.ip))prows.push(['혁신제품 희망가격',prc(c.ip)]);
  if(prows.length){
    h+='<div class="sec"><div class="sh">💵 채널별 금액대</div>';
    prows.forEach(function(r){h+='<div class="priceline"><span>'+r[0]+'</span><b>'+r[1]+'</b></div>';});
    if(c.masn)h+='<div style="font-size:10px;color:#aaa;margin-top:6px">종합쇼핑몰 등록 '+c.masn+'건'+(c.massp&&c.massp.length?' · '+c.massp.slice(0,4).map(esc).join(' · '):'')+'</div>';
    h+='</div>';
  }

  /* AI 즉석질문 */
  h+='<div class="sec"><div class="sh">🔍 이 회사에 즉석 질문 (AI + 실시간 검색)</div>'
    +'<div class="qrow">'
    +'<button class="qbtn" onclick="askAI(\''+b+'\',\'7년 이내 등록특허가 있나요? 몇 건인가요?\')">7년내 특허?</button>'
    +'<button class="qbtn" onclick="askAI(\''+b+'\',\'여기 표시되지 않은 인증(우수제품·성능인증·조달우수·혁신제품 등)을 보유하고 있나요?\')">미표시 인증?</button>'
    +'<button class="qbtn" onclick="askAI(\''+b+'\',\'최근 공공조달 납품실적이나 나라장터 등록 현황은 어떤가요?\')">조달 현황?</button>'
    +'<button class="qbtn" onclick="askAI(\''+b+'\',\'이 회사의 주요 경쟁사는 어디인가요?\')">경쟁사?</button>'
    +'</div>'
    +'<div style="display:flex;gap:6px;margin-top:6px"><input id="aiin-'+b+'" class="aiin" placeholder="직접 질문 입력 후 Enter" onkeydown="if(event.key===\'Enter\')askAI(\''+b+'\',this.value)"><button class="qbtn" style="flex-shrink:0" onclick="askAI(\''+b+'\',document.getElementById(\'aiin-'+b+'\').value)">질문</button></div>'
    +'<div id="aiq-'+b+'" class="aiq" style="display:none"></div>'
    +'</div>';

  /* voice + memo */
  var mynote=(STATE.n[b]||{}).x||'';
  h+='<div class="sec">'
    +'<div style="margin-bottom:10px;background:#f0fdf4;border:2px solid #4caf50;border-radius:12px;padding:10px;text-align:center">'
    +'<button id="wbtn-'+b+'" onclick="startWhisper(\''+b+'\')" style="width:100%;padding:14px;background:#4caf50;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit">🎙 녹음 시작 → AI 자동 변환</button>'
    +'<div style="font-size:10px;color:#666;margin-top:5px">누르고 말하기 → 중지하면 텍스트 자동입력 (Chrome)</div></div>'
    +'<div class="sh">📝 현장 메모 / 정보수정</div>'
    +'<textarea class="note-ta" oninput="saveNote(\''+b+'\',this.value)" placeholder="상담 내용, 명함 정보, DM과 다른 점 등">'+esc(mynote)+'</textarea>'
    +'</div>';
  h+='<div class="sec" style="text-align:center"><a class="growbtn" href="'+GROWMAPS+'" target="_blank">🗺 GrowMaps 실측 부스맵 열기</a></div>';

  det.innerHTML=h;
  if(c.dm&&c.pn)fetchAI(c,'ai-'+b);
}

/* ---------- whisper ---------- */
var mediaRec=null,isRec=false;
function startWhisper(b){
  var btn=document.getElementById('wbtn-'+b);
  var ta=document.querySelector('#det .note-ta');
  if(isRec){isRec=false;if(mediaRec&&mediaRec.state==='recording')mediaRec.stop();return;}
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    var chunks=[];isRec=true;mediaRec=new MediaRecorder(stream);
    mediaRec.ondataavailable=function(e){if(e.data&&e.data.size>0)chunks.push(e.data);};
    mediaRec.onstop=function(){
      stream.getTracks().forEach(function(t){t.stop();});isRec=false;
      btn.textContent='⏳ AI 변환 중...';btn.style.background='#ff9800';
      if(!chunks.length){btn.textContent='🎙 녹음 시작 → AI 자동 변환';btn.style.background='#4caf50';return;}
      var blob=new Blob(chunks,{type:'audio/webm'});
      fetch(WORKER,{method:'POST',headers:{'Content-Type':'audio/webm'},body:blob}).then(function(r){return r.json();}).then(function(d){
        if(d.text&&ta){ta.value=ta.value+(ta.value?'\n':'')+d.text;saveNote(b,ta.value);}
        btn.textContent='🎙 녹음 시작 → AI 자동 변환';btn.style.background='#4caf50';
      }).catch(function(e){btn.textContent='🎙 녹음 시작 → AI 자동 변환';btn.style.background='#4caf50';alert('변환 실패: '+e.message);});
    };
    mediaRec.start(1000);btn.textContent='⏹ 녹음 중... (탭하면 변환)';btn.style.background='#f44336';
  }).catch(function(){isRec=false;alert('마이크 권한을 허용해주세요.');});
}

/* ---------- stats ---------- */
function showTab(btn,v){var a=document.querySelectorAll('.view');for(var i=0;i<a.length;i++)a[i].classList.remove('on');var t=document.querySelectorAll('.tab');for(i=0;i<t.length;i++)t[i].classList.remove('on');document.getElementById(v+'View').classList.add('on');btn.classList.add('on');if(v==='stats')renderStats();if(v==='list')renderList();if(v==='map')setTimeout(function(){measureStage();if(!FITTED){stageFit('all');FITTED=true;}else{clampStage();stageApply();}},40);}
function renderStats(){
  var total=CO.length,dm=0,vis=0,card=0,visPat=0,visProc=0;
  var byg={'A++':0,'A':0,'B+':0,'B':0,'B21':0};
  for(var i=0;i<CO.length;i++){var c=CO[i];if(c.dm)dm++;if(isVis(c.b)){vis++;if(c.pt&&parseInt(c.pt)>0)visPat++;if(c.pamt)visProc+=c.pamt;}if(hasCard(c.b))card++;}
  for(var b in STATE.v){var c=byB[b];if(c&&c.dm&&byg[c.g]!==undefined)byg[c.g]++;}
  var h='<div class="sg">'
    +'<div class="sc"><div class="sv">'+vis+'</div><div class="sl">방문 완료 / '+total+'</div></div>'
    +'<div class="sc"><div class="sv" style="color:#e65100">'+card+'</div><div class="sl">🪪 명함 수령</div></div>'
    +'<div class="sc"><div class="sv" style="color:#6a1b9a">'+dm+'</div><div class="sl">📮 DM 발송완료</div></div>'
    +'<div class="sc"><div class="sv">'+visPat+'</div><div class="sl">방문한 특허보유사</div></div>'
    +'<div class="sc"><div class="sv" style="color:#00897b">'+wonFmt(visProc)+'</div><div class="sl">방문업체 조달실적 합계<br>(전품목·참고)</div></div>'
    +'</div>';
  /* visited detail */
  h+='<div class="shd">✅ 방문 업체 ('+vis+')</div>';
  var vb=[];for(var b in STATE.v)if(isVis(b))vb.push(b);
  if(!vb.length){h+='<div class="vl"><div style="padding:16px;color:#aaa;text-align:center;font-size:12px">아직 방문한 업체가 없습니다</div></div>';}
  else{h+='<div class="vl">';for(i=0;i<vb.length;i++){var c=byB[vb[i]];if(!c)continue;var nt=(STATE.n[c.b]||{}).x||'';
    h+='<div class="vr"><div style="display:flex;align-items:center;gap:6px"><b style="color:#0d47a1">'+c.b+'</b> '+esc(c.n)
      +(c.dm&&c.g?' <span class="tag" style="background:'+(GC[c.g]||'#666')+';color:#fff">'+c.g+'</span>':'')
      +(hasCard(c.b)?' <span class="tag" style="background:#fff8e1;color:#e65100">🪪 명함</span>':'')+'</div>'
      +(c.i?'<div style="font-size:11px;color:#888">📦 '+esc(c.i)+'</div>':'')
      +(nt?'<div style="font-size:11px;color:#333;background:#fffde7;padding:6px 8px;border-radius:6px;border:1px solid #ffe082">💬 '+esc(nt)+'</div>':'')
      +'</div>';}
    h+='</div>';}
  /* grade breakdown */
  h+='<div class="shd">📮 방문한 DM업체 등급별</div><div class="vl"><div class="vr" style="flex-direction:row;gap:10px;flex-wrap:wrap">';
  for(var g in byg){h+='<span class="tag" style="background:'+GC[g]+';color:#fff">'+g+' '+byg[g]+'</span>';}
  h+='</div></div>';
  document.getElementById('statsInner').innerHTML=h+'<button onclick="genReport()" style="width:100%;padding:14px;background:#0d47a1;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">🤖 AI 상담결과 보고서 생성</button>';
}
function genReport(){
  var vb=[];for(var b in STATE.v)if(isVis(b))vb.push(b);
  if(!vb.length){alert('방문한 업체가 없습니다.');return;}
  var list=vb.map(function(b,i){var c=byB[b];var nt=(STATE.n[b]||{}).x||'';
    return (i+1)+'. ['+b+'] '+c.n+(c.dm&&c.g?' ('+c.g+')':'')+(c.i?' | '+c.i:'')+(c.pt?' | 특허 '+c.pt+'건(7년 '+c.p7+')':'')+(hasCard(b)?' | 명함수령':'')+(nt?' | 메모: '+nt:'');}).join('\n');
  var d=new Date(),ds=d.getFullYear()+'.'+(d.getMonth()+1)+'.'+d.getDate();
  var prm='당신은 특허·인증 컨설팅 회사(한국조달컨설팅)의 박람회 상담 보고서 작성 전문가입니다.\n\n'+ds+' AI안전보건박람회 현장 상담 데이터입니다. 담당: 권영선.\n방문 '+vb.length+'곳.\n\n[방문 업체]\n'+list+'\n\n다음 형식의 한국어 보고서를 작성하세요:\n1. 오늘 성과 요약(3줄)\n2. 최우선 후속 조치 TOP 3~5 (이유·권장액션)\n3. 전체 방문 업체 정리(핵심 1~2줄)\n4. 내일/이번주 할 일\n5. 인사이트(특허·조달 관점). 실무자가 바로 이메일 보낼 수 있게 구체적으로.';
  var m=document.createElement('div');m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:flex;flex-direction:column';
  m.innerHTML='<div style="background:#0d47a1;padding:14px 16px;display:flex;justify-content:space-between;align-items:center"><b style="color:#fff;font-size:14px">🤖 AI 보고서</b><button onclick="this.closest(\'div\').parentNode.remove()" style="background:rgba(255,255,255,.2);border:none;color:#fff;padding:5px 12px;border-radius:5px;cursor:pointer">✕ 닫기</button></div><div id="rb" style="flex:1;overflow-y:auto;padding:16px;color:#fff;white-space:pre-wrap;font-size:13px;line-height:1.8">분석 중... ⏳</div><div style="padding:12px;background:#1a1a1a"><button id="cp" style="width:100%;padding:12px;background:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer">📋 복사하기</button></div>';
  document.body.appendChild(m);
  fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true','x-api-key':AKEY},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,messages:[{role:'user',content:prm}]})})
  .then(function(r){return r.json();}).then(function(d2){var rep=(d2.content&&d2.content[0]&&d2.content[0].text)||'생성 실패';var full='AI안전보건박람회(국제안전보건전시회) 상담 결과 보고서\n'+ds+' | 한국조달컨설팅\n━━━━━━━━━━━━━━━━━━━━\n\n'+rep;var rb=document.getElementById('rb');rb.style.color='#111';rb.style.background='#fff';rb.textContent=full;document.getElementById('cp').onclick=function(){navigator.clipboard.writeText(full).then(function(){document.getElementById('cp').textContent='✅ 복사완료';});};})
  .catch(function(e){document.getElementById('rb').textContent='오류: '+e;});
}
