/* 음성인식 */
var recog=null;var isRec=false;
function startVoice(b){
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){
    alert('이 브라우저는 음성인식을 지원하지 않습니다.\nChrome 앱에서 열어주세요.');
    return;
  }
  var btn=document.getElementById('voice-btn-'+b);
  var ta=document.querySelector('.note-ta[data-b="'+b+'"]');
  if(!ta)return;
  if(isRec){
    if(recog)recog.stop();
    isRec=false;
    btn.textContent='🎤 음성입력';
    btn.style.background='#e3f2fd';
    btn.style.color='#1565c0';
    return;
  }
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recog=new SR();
  recog.lang='ko-KR';
  recog.continuous=true;
  recog.interimResults=true;
  recog.maxAlternatives=1;
  var base=ta.value;
  recog.onstart=function(){
    isRec=true;
    btn.textContent='⏹ 중지 (탭하면 종료)';
    btn.style.background='#ffebee';
    btn.style.color='#b71c1c';
  };
  recog.onresult=function(e){
    var interim='',final='';
    for(var i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)final+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    ta.value=base+final+(interim?'['+interim+']':'');
    saveNote(b,ta.value.replace(/\[[^\]]*\]/g,''));
  };
  recog.onend=function(){
    /* 사용자가 중지 버튼 누른 게 아니면 자동 재시작 */
    if(isRec){
      try{recog.start();}catch(e){}
      return;
    }
    btn.textContent='🎤 음성입력 (말하기)';
    btn.style.background='#e3f2fd';
    btn.style.color='#1565c0';
    base=ta.value.replace(/\[[^\]]*\]/g,'');
    ta.value=base;
    saveNote(b,base);
  };
  recog.onerror=function(e){
    isRec=false;
    btn.textContent='🎤 음성입력';
    btn.style.background='#e3f2fd';
    btn.style.color='#1565c0';
    if(e.error==='not-allowed')alert('마이크 권한을 허용해주세요.\n브라우저 설정에서 마이크를 허용하세요.');
  };
  recog.start();
}



/* Whisper 음성녹음 */
var mediaRec=null; var audioChunks=[]; var isRecording=false;

function startWhisper(b){
  var btn=document.getElementById('whisper-btn-'+b);
  if(isRecording){
    /* 녹음 중지 */
    if(mediaRec) mediaRec.stop();
    return;
  }
  /* 녹음 시작 */
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    audioChunks=[];
    mediaRec=new MediaRecorder(stream);
    mediaRec.ondataavailable=function(e){if(e.data.size>0)audioChunks.push(e.data);};
    mediaRec.onstart=function(){
      isRecording=true;
      btn.textContent='⏹ 중지 (탭하면 변환)';
      btn.style.background='#ffebee';
      btn.style.color='#b71c1c';
      btn.style.border='1.5px solid #ef9a9a';
    };
    mediaRec.onstop=function(){
      isRecording=false;
      btn.textContent='⏳ 변환 중...';
      btn.style.background='#fff9c4';
      btn.style.color='#e65100';
      stream.getTracks().forEach(function(t){t.stop();});
      /* Whisper API로 전송 */
      var blob=new Blob(audioChunks,{type:'audio/webm'});
      fetch('https://white-morning-52ad.yourstoryup.workers.dev/',{
        method:'POST',
        headers:{'Content-Type':'audio/webm'},
        body:blob
      }).then(function(r){return r.json();}).then(function(d){
        console.log('Whisper 응답:', JSON.stringify(d));
        var text=d.text||(d.error&&d.error.message?'오류: '+d.error.message:('응답: '+JSON.stringify(d)));
        var ta=document.querySelector('.note-ta[data-b="'+b+'"]');
        if(ta){
          ta.value=(ta.value?ta.value+'\n':'')+text;
          saveNote(b,ta.value);
        }
        btn.textContent='🎙 녹음 시작';
        btn.style.background='#e8f5e9';
        btn.style.color='#2e7d32';
        btn.style.border='1.5px solid #a5d6a7';
      }).catch(function(e){
        btn.textContent='🎙 녹음 시작';
        btn.style.background='#e8f5e9';
        btn.style.color='#2e7d32';
        btn.style.border='1.5px solid #a5d6a7';
        alert('변환 실패: '+e.message);
      });
    };
    mediaRec.start();
  }).catch(function(e){
    alert('마이크 권한을 허용해주세요.\n브라우저 설정에서 마이크를 허용하세요.');
  });
}

function sendToKW(co, note, isVisit) {
  if (!KW_URL) {
    alert('카카오워크 Webhook URL이 설정되지 않았습니다.\n상단 [⚙️ KW설정] 버튼을 눌러 URL을 입력하세요.');
    return;
  }
  var userName = TN[ME];
  var now = new Date();
  var timeStr = ('0'+now.getHours()).slice(-2) + ':' + ('0'+now.getMinutes()).slice(-2);
  var patCount = (co.p||[]).length;
  var u7Count = (co.p||[]).filter(function(p){return p.u7;}).length;
  var certCount = (co.c||[]).length;
  var validCert = (co.c||[]).filter(function(c){return c.v===1||c.v===2;}).length;

  var statusIcon = isVisit ? '✅ 방문완료' : '📝 메모입력';
  var blocks = [
    {
      type: 'header',
      text: statusIcon + ' [' + co.b + '] ' + co.n
    },
    {
      type: 'section',
      text: '🕐 ' + timeStr + '  |  👤 ' + userName
        + (co.region ? '  |  📍 ' + co.region : '')
    }
  ];

  if (co.i) blocks.push({type:'section', text:'📦 출품: ' + co.i});
  if (co.ceo) blocks.push({type:'section', text:'🏢 대표: ' + co.ceo});
  if (co.addr && co.addr !== '0') blocks.push({type:'section', text:'📍 주소: ' + co.addr});

  var patLine = '📜 특허 ' + patCount + '건 (7년미만 ' + u7Count + '건)';
  var certLine = '🏅 인증 ' + certCount + '건 (유효 ' + validCert + '건)';
  blocks.push({type:'section', text: patLine + '  /  ' + certLine});

  if (note && note.trim()) {
    blocks.push({type:'divider'});
    blocks.push({type:'section', text:'💬 상담메모\n' + note.trim()});
  }

  /* 카카오워크 Incoming Webhook 포맷 */
  var payload = {
    text: statusIcon + ' [' + co.b + '] ' + co.n + ' - ' + userName + ' ' + timeStr,
    blocks: blocks
  };

  fetch(KW_URL, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload)
  }).then(function() {
    alert('카카오워크로 전송했습니다! ✅');
  }).catch(function(e) {
    /* CORS 오류 시 대안: 텍스트로 복사 */
    var msg = statusIcon + ' [' + co.b + '] ' + co.n + '\n'
      + '🕐 ' + timeStr + ' / 👤 ' + userName + '\n'
      + (co.i ? '📦 ' + co.i + '\n' : '')
      + (co.region ? '📍 ' + co.region + '\n' : '')
      + patLine + ' / ' + certLine
      + (note && note.trim() ? '\n💬 ' + note.trim() : '');
    if (navigator.clipboard) {
      navigator.clipboard.writeText(msg).then(function(){
        alert('카카오워크 전송 실패 (CORS)\n메시지를 클립보드에 복사했습니다!\n카카오워크에 직접 붙여넣기 하세요.');
      });
    } else {
      prompt('아래 내용을 복사해서 카카오워크에 붙여넣으세요:', msg);
    }
  });
}
