<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>특허 검색 — 한국조달컨설팅</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#f8f9fa !important;}
:root{
  --bg:#f8f9fa;--surface:#ffffff;--surface2:#f1f3f5;
  --border:#dee2e6;--border2:#ced4da;
  --text:#212529;--text2:#495057;--text3:#adb5bd;
  --blue:#1971c2;--blue-bg:#e7f5ff;--blue-bd:#74c0fc;
  --green:#2f9e44;--green-bg:#ebfbee;--green-bd:#8ce99a;
  --amber:#e67700;--amber-bg:#fff9db;--amber-bd:#ffd43b;
  --red:#c92a2a;--red-bg:#fff5f5;--red-bd:#ffa8a8;
  --font:'Noto Sans KR',system-ui,sans-serif;
  --mono:'JetBrains Mono','Fira Code',monospace;
  --r:8px;--rs:6px;
}
body{background:#f8f9fa !important;color:var(--text);font-family:var(--font);font-size:13px;min-height:100vh}

.header{background:#1971c2;padding:14px 24px;display:flex;align-items:center;gap:12px}
.logo{width:36px;height:36px;background:rgba(255,255,255,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.htitle{font-size:15px;font-weight:700;color:#fff}
.hsub{font-size:11px;color:rgba(255,255,255,.75);margin-top:1px}
.hright{margin-left:auto;font-size:11px;color:rgba(255,255,255,.6)}

.search-section{background:#fff;border-bottom:1px solid var(--border);padding:24px}
.stitle{font-size:18px;font-weight:700;color:var(--text);margin-bottom:4px}
.sdesc{font-size:12px;color:var(--text2);margin-bottom:16px;line-height:1.6}
.sbox{display:flex;gap:8px;margin-bottom:10px}
.sbox input{flex:1;background:#fff;border:1.5px solid var(--border2);border-radius:var(--r);color:var(--text);padding:11px 16px;font-size:15px;font-family:var(--font);outline:none;transition:border .2s}
.sbox input:focus{border-color:var(--blue)}
.sbox input::placeholder{color:var(--text3)}
.btn-search{background:#1971c2;border:none;border-radius:var(--r);color:#fff;padding:11px 22px;font-size:14px;font-weight:600;font-family:var(--font);cursor:pointer;white-space:nowrap;transition:opacity .15s}
.btn-search:hover{opacity:.88}
.btn-search:disabled{opacity:.5;cursor:not-allowed}
.qtags{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.qtag{background:#f1f3f5;border:1px solid var(--border);border-radius:99px;padding:4px 11px;font-size:11px;color:var(--text2);cursor:pointer;transition:all .15s}
.qtag:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}

.result-section{padding:20px 24px;max-width:1000px}

.badge{display:inline-flex;align-items:center;font-size:10px;padding:2px 8px;border-radius:99px;font-weight:700}
.b-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.b-amber{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd)}
.b-blue{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)}
.b-gray{background:#f1f3f5;color:var(--text3);border:1px solid var(--border)}
.b-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}

.summary-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px}
.scard{background:#fff;border:1px solid var(--border);border-radius:var(--rs);padding:12px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.scard-n{font-size:24px;font-weight:700;font-family:var(--mono)}
.scard-l{font-size:10px;color:var(--text2);margin-top:3px}
.ng{color:var(--green)}.nb{color:var(--blue)}.na{color:var(--amber)}.ngray{color:var(--text3)}

.patent-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.patent-card.card-usable{border-color:var(--green-bd);border-left:4px solid var(--green)}
.patent-card.card-app{border-color:var(--amber-bd);border-left:4px solid var(--amber)}
.patent-card.card-exp{border-color:var(--border);opacity:.7}

.ptitle{font-size:15px;font-weight:700;line-height:1.4;color:var(--text);margin:8px 0 12px}

.pmeta{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px}
.mitem{background:#f8f9fa;border:1px solid var(--border);border-radius:var(--rs);padding:8px 10px}
.mlabel{font-size:10px;color:var(--text3);margin-bottom:2px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.mval{font-size:12px;font-weight:600;font-family:var(--mono);color:var(--text)}
.mval.vg{color:var(--green)}.mval.va{color:var(--amber)}

.slabel{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:7px;letter-spacing:.04em;text-transform:uppercase;display:flex;align-items:center;gap:5px}

.abstract-box{background:#f8f9fa;border:1px solid var(--border);border-radius:var(--rs);padding:12px;font-size:12px;line-height:1.75;color:var(--text2);margin-bottom:14px;white-space:pre-wrap;word-break:break-all}

/* 청구항 박스 — 흰 바탕, 파란 테두리, 전체 표시 */
.claim-wrap{margin-bottom:14px}
.claim-box{
  background:#fff;
  border:1.5px solid var(--blue-bd);
  border-radius:var(--rs);
  padding:16px;
  font-size:13px;
  line-height:2;
  color:var(--text);
  white-space:pre-wrap;
  word-break:break-all;
  word-wrap:break-word;
  overflow-wrap:break-word;
  /* 절대 자르지 않음 */
}
.claim-loading{color:var(--text3);font-style:italic;padding:12px;text-align:center;font-size:12px}
.claim-empty{color:var(--text3);font-size:12px;padding:8px;font-style:italic}

.comp-wrap{margin-bottom:14px}
.comp-list{display:flex;flex-direction:column;gap:5px}
.comp-item{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:var(--rs);font-size:12px;line-height:1.5}
.comp-item.hi{background:var(--blue-bg);border:1px solid var(--blue-bd)}
.comp-item.mi{background:#f8f9fa;border:1px solid var(--border)}
.comp-text{flex:1;color:var(--text)}
.comp-badge{font-size:10px;padding:1px 6px;border-radius:99px;flex-shrink:0;white-space:nowrap;font-weight:600}
.cbh{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)}
.cbm{background:#f1f3f5;color:var(--text3)}

.test-wrap{margin-bottom:14px}
.test-tags{display:flex;gap:5px;flex-wrap:wrap}
.test-tag{background:var(--green-bg);border:1px solid var(--green-bd);border-radius:99px;padding:4px 10px;font-size:11px;color:var(--green);font-weight:600}

.effect-wrap{margin-bottom:14px}
.effect-box{background:#f8f9fa;border:1px solid var(--border);border-radius:var(--rs);padding:12px;font-size:12px;line-height:1.75;color:var(--text2);white-space:pre-wrap;word-break:break-all}

.divider{border:none;border-top:1px solid var(--border);margin:14px 0}

.copy-row{display:flex;gap:6px;flex-wrap:wrap}
.bcopy{background:#f8f9fa;border:1px solid var(--border2);border-radius:var(--rs);color:var(--text2);padding:7px 13px;font-size:12px;font-family:var(--font);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:4px}
.bcopy:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}
.bcopy.copied{border-color:var(--green);color:var(--green);background:var(--green-bg)}
.bclaim{background:#1971c2;border:none;border-radius:var(--rs);color:#fff;padding:7px 14px;font-size:12px;font-family:var(--font);cursor:pointer;font-weight:600;display:flex;align-items:center;gap:4px;transition:opacity .15s}
.bclaim:hover{opacity:.88}
.bclaim.copied{background:var(--green)}
.bcomp{background:var(--green-bg);border:1px solid var(--green-bd);border-radius:var(--rs);color:var(--green);padding:7px 13px;font-size:12px;font-family:var(--font);cursor:pointer;font-weight:600;display:flex;align-items:center;gap:4px;transition:opacity .15s}
.bcomp:hover{opacity:.8}

.loading{text-align:center;padding:3rem;color:var(--text2);background:#fff;border-radius:var(--r);border:1px solid var(--border)}
.spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.pstep{font-size:12px;color:var(--text3);margin-top:6px}

.empty{text-align:center;padding:4rem 2rem;color:var(--text3);background:#fff;border-radius:var(--r);border:1px solid var(--border)}
.empty-icon{font-size:44px;opacity:.3;margin-bottom:10px}

.status-bar{font-size:11px;color:var(--text3);background:#f8f9fa;border:1px solid var(--border);border-radius:var(--rs);padding:8px 12px;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--blue);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

@media(max-width:600px){
  .pmeta{grid-template-columns:repeat(2,1fr)}
  .summary-row{grid-template-columns:repeat(2,1fr)}
  .sbox{flex-direction:column}
  .result-section{padding:14px}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">🔍</div>
  <div>
    <div class="htitle">특허 검색 & 청구항 분석</div>
    <div class="hsub">기업명 입력 → KIPRIS 실시간 조회 → 청구항 1항 전체 추출 → 제안서 복사</div>
  </div>
  <div class="hright">한국조달컨설팅(주)</div>
</div>

<div class="search-section">
  <div class="stitle">기업 특허 조회</div>
  <div class="sdesc">
    기업명을 입력하면 KIPRIS에서 전체 특허를 실시간으로 조회합니다.<br>
    <strong style="color:#1971c2">청구항 1항 전문</strong>을 그대로 복사해서 제안서에 바로 붙여넣을 수 있습니다.
  </div>
  <div class="sbox">
    <input type="text" id="inp" placeholder="기업명 입력 (예: 파이터코리아, 오에스엘이엔지, 유원티이씨...)" autocomplete="off">
    <button class="btn-search" id="btn" onclick="doSearch()">특허 조회</button>
  </div>
  <div class="qtags">
    <span style="font-size:11px;color:var(--text3)">빠른 검색:</span>
    <span class="qtag" onclick="quick('파이터코리아')">파이터코리아</span>
    <span class="qtag" onclick="quick('오에스엘이엔지')">오에스엘이엔지</span>
    <span class="qtag" onclick="quick('에이앤지테크')">에이앤지테크</span>
    <span class="qtag" onclick="quick('유원티이씨')">유원티이씨</span>
    <span class="qtag" onclick="quick('써보레')">써보레</span>
    <span class="qtag" onclick="quick('싸이버메딕')">싸이버메딕</span>
    <span class="qtag" onclick="quick('엔에프방재')">엔에프방재</span>
    <span class="qtag" onclick="quick('한컴라이프케어')">한컴라이프케어</span>
  </div>
</div>

<div class="result-section" id="area">
  <div class="empty" style="margin-top:16px">
    <div class="empty-icon">📋</div>
    <div style="font-size:14px;font-weight:600;margin-bottom:4px;color:var(--text)">기업명을 입력하고 조회하세요</div>
    <div style="font-size:12px">특허명 · 등록번호 · 등록일 · 만료일 · 청구항 1항 전문이 표시됩니다</div>
  </div>
</div>

<script>
const KEY = 'Mk1YvlvbqQGzVQDXukYLom7nD5U3wVkD15K5nUxCwI0=';
const SRC = 'http://plus.kipris.or.kr/kipo-api/kipi/patUtiModInfoSearchSevice/getWordSearch';
const DTL = 'http://plus.kipris.or.kr/kipo-api/kipi/patUtiModInfoSearchSevice/getPatentUtilityInfo';

// CORS 프록시 — 실패 시 다음으로 자동 전환
const PROXIES = [
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://proxy.cors.sh/${url}`,
];

const HKW = ['자동소화','소화','화재감지','연기감지','가스감지','불꽃감지','스프링클러',
  'AI','인공지능','딥러닝','영상분석','디지털트윈','IoT','스마트제어',
  '미세먼지','공기정화','UV살균','살균','항균','에너지절감','고효율','LED',
  '내진','방폭','방수','방진','내화','원격감시','자동제어','센서','측정',
  '응급','구조','구급','심정지','심장충격','AED','재활','뇌신경','전기차','배터리'];

const TMAP=[
  [['소화','소화약제'],'소화 성능 시험 (KFI 기준)'],
  [['화재감지','연기감지','불꽃감지'],'화재감지 응답시간 시험'],
  [['가스감지','CO2'],'가스 농도 감지 정확도 시험'],
  [['미세먼지','공기정화'],'공기청정 성능 시험 (PM2.5)'],
  [['LED','조명'],'광도·광효율 시험 (KSC)'],
  [['에너지절감','소비전력'],'에너지 효율 시험'],
  [['방수','방진'],'방수·방진 시험 (IP등급)'],
  [['내진','진동'],'내진·내충격 성능 시험'],
  [['AI','인공지능','영상'],'AI 인식 정확도 시험'],
  [['무선','통신','IoT'],'무선 통신 성능 시험'],
  [['센서','측정'],'센서 정확도 시험'],
  [['응급','구조','심정지','AED'],'응급구조 성능 시험'],
  [['전기차','배터리','리튬'],'전기차 화재 안전성 시험'],
];

const claimStore = {};

function fd(s){return s&&s.length===8?`${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6)}`:s||''}

function calcDates(rd){
  if(!rd||rd.length!==8) return {exp:'-',yrs:null,new7:false,dl:'-'};
  const d=new Date(+rd.slice(0,4),+rd.slice(4,6)-1,+rd.slice(6));
  const exp=new Date(d); exp.setFullYear(exp.getFullYear()+20);
  const cut=new Date(d); cut.setFullYear(cut.getFullYear()+7);
  const now=new Date();
  const yrs=Math.floor((now-d)/(365.25*864e5));
  const new7=d>=new Date(now.getFullYear()-7,0,1);
  const left=Math.floor((cut-now)/(365.25*864e5));
  const dl=new7?(left>0?`${cut.toISOString().slice(0,10)} (${left}년 남음)`:'곧 만료'):'7년 초과';
  return {exp:exp.toISOString().slice(0,10),yrs,new7,dl};
}

async function fx(url){
  // 여러 프록시 순서대로 시도
  for(const mkProxy of PROXIES){
    try{
      const r=await fetch(mkProxy(url),{signal:AbortSignal.timeout(12000)});
      if(!r.ok) continue;
      const text=await r.text();
      if(text.includes('<response>') || text.includes('resultCode')) return text;
    }catch(e){continue;}
  }
  return 'ERR:모든 프록시 실패';
}

function parsePatents(xml, alias){
  if(!xml||xml.startsWith('ERR')) return {list:[],err:xml};
  try{
    const doc=new DOMParser().parseFromString(xml,'text/xml');
    const code=doc.querySelector('resultCode')?.textContent||'';
    if(code==='22') return {list:[],limit:true};
    if(!['00','N0001',''].includes(code)) return {list:[],err:`코드:${code}`};
    const list=[];
    doc.querySelectorAll('item').forEach(it=>{
      const g=t=>it.querySelector(t)?.textContent?.trim()||'';
      const appl=g('applicantName');
      if(!appl.includes(alias)) return;
      const rn=g('registerNumber'), rd=g('registerDate');
      const an=g('applicationNumber'), ad=g('applicationDate');
      const rs=g('registerStatus');
      let st='출원';
      if(rn&&rd) st='등록';
      else if(['소멸','취하'].some(k=>rs.includes(k))) st='소멸/만료';
      else if(rs.includes('포기')) st='포기';
      else if(rs.includes('거절')) st='거절';
      const dates=calcDates(rd);
      let fno=rn; if(rn.length===13) fno=`10-${rn.slice(2,9)}-${rn.slice(9)}`;
      list.push({st,title:g('inventionTitle'),reg_no:fno,rn_raw:rn,an,
        rd:fd(rd),ad:fd(ad),exp:dates.exp,yrs:dates.yrs,new7:dates.new7,dl:dates.dl,
        abs:g('astrtCont'),appl,inv:g('inventorName'),ipc:g('ipcNumber')});
    });
    return {list};
  }catch(e){return {list:[],err:'파싱오류'};}
}

async function searchAll(alias){
  const all=[];
  for(const st of ['R','A','C','F','G']){
    const url=`${SRC}?${new URLSearchParams({ServiceKey:KEY,word:alias,year:'0',numOfRows:'30',pageNo:'1',registerStatus:st})}`;
    const xml=await fx(url);
    const {list,limit}=parsePatents(xml,alias);
    if(limit) break;
    if(list) all.push(...list);
    await new Promise(r=>setTimeout(r,300));
  }
  const seen=new Set(),u=[];
  all.forEach(p=>{const k=p.rn_raw||p.an; if(k&&!seen.has(k)){seen.add(k);u.push(p);}});
  u.sort((a,b)=>{
    const sp={등록:0,출원:1,'소멸/만료':2,포기:3,거절:4};
    if(a.new7!==b.new7) return a.new7?-1:1;
    if(sp[a.st]!==sp[b.st]) return sp[a.st]-sp[b.st];
    return (b.rd||b.ad||'').localeCompare(a.rd||a.ad||'');
  });
  return u;
}

async function fetchClaim(an){
  if(!an) return {c1:'',eff:''};
  const url=`${DTL}?${new URLSearchParams({ServiceKey:KEY,applicationNumber:an})}`;
  const xml=await fx(url);
  if(!xml||xml.startsWith('ERR')) return {c1:'',eff:''};
  try{
    const doc=new DOMParser().parseFromString(xml,'text/xml');
    let raw='';
    for(const t of ['claimText','claim','clm','claimData','claims']){
      const v=doc.querySelector(t)?.textContent?.trim()||'';
      if(v){raw=v;break;}
    }
    let eff='';
    for(const t of ['advantageousEffects','effect','effectsOfInvention','advEff']){
      const v=doc.querySelector(t)?.textContent?.trim()||'';
      if(v){eff=v;break;}
    }
    // 청구항 1항 전체 — 길이 제한 없음
    let c1='';
    if(raw){
      const pats=[
        /【청구항\s*1】\s*([\s\S]*?)(?=【청구항\s*2】|$)/,
        /청구항\s*1[.：]\s*([\s\S]*?)(?=\n청구항\s*2|$)/,
        /^\s*1[.)]\s+([\s\S]*?)(?=\n\s*2[.)]\s|$)/m,
      ];
      for(const pat of pats){
        const m=raw.match(pat);
        if(m&&m[1].trim()){c1=m[1].trim();break;}
      }
      if(!c1) c1=raw; // 패턴 없으면 전체
    }
    return {c1,eff};
  }catch(e){return {c1:'',eff:''};}
}

function analyzeComp(c1){
  if(!c1) return {comps:[],tests:[],str:''};
  const parts=c1.split(/[;；]/);
  const comps=[];
  parts.forEach(p=>{
    p=p.trim();
    if(p.length<5) return;
    if(['을 포함하는','를 포함하는','에 있어서','로 이루어','이하 같다'].some(e=>p.includes(e))) return;
    const hi=HKW.some(k=>p.includes(k));
    comps.push({text:p,hi});
  });
  const tests=TMAP.filter(([kws])=>kws.some(k=>c1.includes(k))).map(([,t])=>t);
  const hc=comps.filter(c=>c.hi).length;
  const str=hc>=3?'🔥 강함':hc>=1?'✅ 보통':'⚠ 약함';
  return {comps,tests,str};
}

function copyText(text,el){
  navigator.clipboard.writeText(text).then(()=>{
    const o=el.innerHTML; el.innerHTML='✓ 복사됨!'; el.classList.add('copied');
    setTimeout(()=>{el.innerHTML=o;el.classList.remove('copied');},2000);
  }).catch(()=>{
    // fallback
    const ta=document.createElement('textarea');
    ta.value=text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    const o=el.innerHTML; el.innerHTML='✓ 복사됨!'; el.classList.add('copied');
    setTimeout(()=>{el.innerHTML=o;el.classList.remove('copied');},2000);
  });
}

function makeCard(p,idx){
  const usable=p.st==='등록'&&p.new7;
  const isApp=p.st==='출원';
  const isExp=['소멸/만료','포기','거절'].includes(p.st);
  const cc=usable?'card-usable':isApp?'card-app':isExp?'card-exp':'';
  const sb=usable?'<span class="badge b-green">✓ 7년미만 조달유력</span>':
    isApp?'<span class="badge b-amber">출원중</span>':
    isExp?`<span class="badge b-red">${p.st}</span>`:'<span class="badge b-gray">7년 초과</span>';
  const t=JSON.stringify;
  return `<div class="patent-card ${cc}" id="pc${idx}">
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px">${sb}</div>
    <div class="ptitle">${p.title}</div>
    <div class="pmeta">
      <div class="mitem"><div class="mlabel">등록번호</div><div class="mval">${p.reg_no||p.an||'-'}</div></div>
      <div class="mitem"><div class="mlabel">등록일</div><div class="mval">${p.rd||'-'}</div></div>
      <div class="mitem"><div class="mlabel">만료일 (등록+20년)</div><div class="mval ${usable?'vg':''}">${p.exp||'출원중'}</div></div>
      <div class="mitem"><div class="mlabel">출원일</div><div class="mval">${p.ad||'-'}</div></div>
      <div class="mitem"><div class="mlabel">경과년수</div><div class="mval">${p.yrs!=null?p.yrs+'년 경과':'-'}</div></div>
      <div class="mitem"><div class="mlabel">조달 활용기한</div><div class="mval ${usable?'vg':'va'}">${p.dl||'-'}</div></div>
      ${p.inv?`<div class="mitem"><div class="mlabel">발명자</div><div class="mval">${p.inv}</div></div>`:''}
      ${p.ipc?`<div class="mitem"><div class="mlabel">IPC 분류</div><div class="mval" style="font-size:11px">${p.ipc.slice(0,50)}</div></div>`:''}
    </div>
    ${p.abs?`<div class="slabel">📄 기술 요약 (초록)</div><div class="abstract-box">${p.abs}</div>`:''}
    <div class="claim-wrap">
      <div class="slabel">📋 청구항 1항 <span style="color:var(--text3);font-weight:400;font-size:10px;text-transform:none;letter-spacing:0">— 전문, 잘리지 않음</span></div>
      <div class="claim-box" id="cl${idx}"><div class="claim-loading">⏳ 청구항 불러오는 중...</div></div>
    </div>
    <div class="comp-wrap" id="cw${idx}" style="display:none">
      <div class="slabel">🔵 핵심 구성요소 (세미콜론 분석)</div>
      <div class="comp-list" id="cc${idx}"></div>
    </div>
    <div class="test-wrap" id="tw${idx}" style="display:none">
      <div class="slabel">🧪 시험 연결 제안</div>
      <div class="test-tags" id="tt${idx}"></div>
    </div>
    <div class="effect-wrap" id="ew${idx}" style="display:none">
      <div class="slabel">💡 발명의 효과</div>
      <div class="effect-box" id="ef${idx}"></div>
    </div>
    <div class="divider"></div>
    <div class="copy-row">
      <button class="bcopy" onclick="copyText(${t(p.title)},this)">📋 특허명</button>
      <button class="bcopy" onclick="copyText(${t(p.reg_no||p.an||'')},this)">📋 등록번호</button>
      <button class="bcopy" onclick="copyText(${t(p.rd||p.ad||'')},this)">📋 등록일</button>
      <button class="bcopy" onclick="copyText(${t(p.exp||'')},this)">📋 만료일</button>
      <button class="bclaim" id="cb${idx}" style="display:none" onclick="copyStore(${idx})">⭐ 청구항1 전체 복사</button>
      <button class="bcomp" id="co${idx}" style="display:none" onclick="copyComp(${idx})">📌 핵심구성 복사</button>
    </div>
  </div>`;
}

async function loadClaim(p,idx){
  const clEl=document.getElementById(`cl${idx}`);
  const cwEl=document.getElementById(`cw${idx}`);
  const twEl=document.getElementById(`tw${idx}`);
  const ewEl=document.getElementById(`ew${idx}`);
  const cbBtn=document.getElementById(`cb${idx}`);
  const coBtn=document.getElementById(`co${idx}`);
  if(!clEl) return;

  const {c1,eff}=await fetchClaim(p.an);
  claimStore[idx]={c1,comps:[]};

  if(c1){
    clEl.textContent=c1; // textContent로 그대로 표시
    cbBtn.style.display='flex';

    const {comps,tests,str}=analyzeComp(c1);
    claimStore[idx].comps=comps;

    if(comps.length>0){
      cwEl.style.display='block';
      document.getElementById(`cc${idx}`).innerHTML=comps.map(c=>`
        <div class="comp-item ${c.hi?'hi':'mi'}">
          <span>${c.hi?'🔵':'⚪'}</span>
          <span class="comp-text">${c.text}</span>
          <span class="comp-badge ${c.hi?'cbh':'cbm'}">${c.hi?'핵심':'일반'}</span>
        </div>`).join('');
      coBtn.style.display='flex';
    }
    if(tests.length>0){
      twEl.style.display='block';
      document.getElementById(`tt${idx}`).innerHTML=tests.map(t=>`<span class="test-tag">${t}</span>`).join('');
    }
    if(eff){
      ewEl.style.display='block';
      document.getElementById(`ef${idx}`).textContent=eff;
    }
  } else {
    clEl.innerHTML=`<div class="claim-empty">이 특허의 청구항 정보를 불러오지 못했습니다.<br>출원 초기 단계이거나 KIPRIS 상세 정보가 아직 없을 수 있습니다.</div>`;
  }
}

function copyStore(idx){
  const t=claimStore[idx]?.c1||'';
  copyText(t,document.getElementById(`cb${idx}`));
}
function copyComp(idx){
  const comps=claimStore[idx]?.comps||[];
  const text=comps.map(c=>(c.hi?'[핵심] ':'')+c.text).join('\n');
  copyText(text,document.getElementById(`co${idx}`));
}

async function doSearch(){
  const alias=document.getElementById('inp').value.trim();
  if(!alias){alert('기업명을 입력해 주세요.');return;}
  const btn=document.getElementById('btn');
  btn.disabled=true; btn.textContent='조회 중...';
  Object.keys(claimStore).forEach(k=>delete claimStore[k]);

  document.getElementById('area').innerHTML=`<div class="loading" style="margin-top:16px">
    <div class="spinner"></div>
    <div style="font-size:13px;font-weight:600;margin-bottom:6px;color:var(--text)">"${alias}" 특허 조회 중...</div>
    <div class="pstep">KIPRIS 특허 데이터베이스 검색 중 (등록·출원·소멸 전체)</div>
  </div>`;

  try{
    const patents=await searchAll(alias);
    if(!patents.length){
      document.getElementById('area').innerHTML=`<div class="empty" style="margin-top:16px">
        <div class="empty-icon">🔍</div>
        <div style="font-size:14px;font-weight:600;margin-bottom:6px;color:var(--text)">"${alias}" — 특허 없음</div>
        <div style="font-size:12px;line-height:1.8">
          KIPRIS 출원인명과 정확히 일치해야 합니다.<br>
          법인명 앞뒤 '주식회사', '(주)', '㈜' 등을 제외한 핵심 상호만 입력해 보세요.<br>
          예) "주식회사 파이터코리아" → <strong>파이터코리아</strong>
        </div>
      </div>`;
      return;
    }

    const reg=patents.filter(p=>p.st==='등록');
    const app=patents.filter(p=>p.st==='출원');
    const yr7=patents.filter(p=>p.new7&&p.st==='등록');
    const exp=patents.filter(p=>['소멸/만료','포기','거절'].includes(p.st));

    document.getElementById('area').innerHTML=`
      <div style="margin:16px 0 14px">
        <div style="font-size:16px;font-weight:700;color:var(--text);margin-bottom:3px">"${alias}" 특허 현황</div>
        <div style="font-size:11px;color:var(--text3)">KIPRIS 실시간 조회 · ${new Date().toLocaleDateString('ko-KR')} 기준 · 총 ${patents.length}건</div>
      </div>
      <div class="summary-row">
        <div class="scard"><div class="scard-n ng">${yr7.length}</div><div class="scard-l">7년미만 조달유력</div></div>
        <div class="scard"><div class="scard-n nb">${reg.length}</div><div class="scard-l">등록 특허</div></div>
        <div class="scard"><div class="scard-n na">${app.length}</div><div class="scard-l">출원중</div></div>
        <div class="scard"><div class="scard-n ngray">${exp.length}</div><div class="scard-l">소멸/만료</div></div>
      </div>
      <div class="status-bar" id="sbar"><span class="status-dot"></span> 청구항 1항 불러오는 중... (0/${patents.filter(p=>p.st==='등록'||p.st==='출원').length}건)</div>
      <div id="pcont">${patents.map((p,i)=>makeCard(p,i)).join('')}</div>`;

    // 청구항 순차 로드
    const targets=patents.filter(p=>p.st==='등록'||p.st==='출원');
    for(let i=0;i<targets.length;i++){
      const p=targets[i];
      const idx=patents.indexOf(p);
      const sbar=document.getElementById('sbar');
      if(sbar) sbar.innerHTML=`<span class="status-dot"></span> 청구항 1항 불러오는 중... (${i+1}/${targets.length}건) — ${p.title.slice(0,30)}...`;
      await loadClaim(p,idx);
      await new Promise(r=>setTimeout(r,400));
    }
    const sbar=document.getElementById('sbar');
    if(sbar){sbar.innerHTML='✅ 청구항 1항 로드 완료';sbar.style.color='var(--green)';sbar.querySelector('.status-dot')?.remove();}

  }catch(e){
    document.getElementById('area').innerHTML=`<div style="background:var(--red-bg);border:1px solid var(--red-bd);border-radius:var(--r);padding:16px;color:var(--red);font-size:13px;margin-top:16px">오류: ${e.message}</div>`;
  }finally{
    btn.disabled=false; btn.textContent='특허 조회';
  }
}

function quick(name){document.getElementById('inp').value=name;doSearch();}
document.getElementById('inp')?.addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
</script>
